<html>
    <head>
        <meta charset="utf-8" />
        <meta name="author" content="Angelle Leger" />
        <meta name="description" content="The contact form for a sample business website" />
        <script src="../javascript/scripts/scripts.js"></script>
        <!-- reusable components start -->
        <script src="../javascript/components/title.js" type="text/javascript" defer></script>
        <script src="../javascript/components/nav.js" type="text/javascript" defer></script>
        <!-- reusable components end -->
        <link href="styles/styles.css" rel="stylesheet" />

    </head>
    <body>
        <title-component></title-component>
        <navigation-component></navigation-component>
        <main>
            <h1>Contact Us</h1>
            <form>
                <div class="form-field">
                    <label for="name">Name:</label>
                    <input type="text" />
                </div>
                <div class="form-field">
                    <label for="phone">Phone:</label>
                    <input type="tel" />
                </div>
                <div class="form-field">
                    <label for="email">E-mail Address:</label>
                    <input type="email" />
                </div>
                <div class="form-field">
                    <label for="message">Message:</label>
                    <input type="text" />
                </div>
            </form>
            <!-- button code for later            
                <button id="subBtn" onclick="myAlert()">Click me</button>
        -->
        </main>   
    </body>
</html>
